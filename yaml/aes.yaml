# SPDX-License-Identifier: CC0-1.0
id: aes
oid: 2.16.840.1.101.3.4.1
name: Advanced Encryption Standard
cryptoClass: Symmetric-Key-Algorithm/Block-Cipher
commonkeySize: '256'
specifiedkeySize: {min: '128', max: '256'}
reference:
  - https://doi.org/10.6028/NIST.FIPS.197-upd1
  - https://doi.org/10.6028/NIST.SP.800-38A
  - https://www.iso.org/standard/81564.html
parameters:
  - name: "keyLength"
    type: "integer"
    Summary: Key size in bits
    Description: Specifies the key size in bits
  - name: "mode"
    Summary: Block cipher mode of operation
    Description: Defines how a block cipher is applied to a message longer than one block. 
      Mode choice determines confidentiality properties, parallelism, and whether authentication is provided.
    type: "enumeration"
    values:
      - GCM
      - CCM
      - CBC
      - CTR
      - OFB
      - CFB
      - CFB128
      - CFB1
      - CFB8
      - XTS
      - SIV
      - GCM-SIV
      - EAX
      - OCB
      - CTS
      - CWC
      - IAPM
      - LRW
      - XEX
      - CMC
      - EME
      - HCTR2
      - CMAC
      - GMAC
      - PCBC
      - ECB
      - CTR-HMAC-SHA1
      - Wrap
      - XCBC_MAC
      - XCBC_MAC_96
          
